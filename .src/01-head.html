<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#171D26">
<title>The Glass Engine</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23171D26'/%3E%3Cpath d='M8 22a10 10 0 0 1 16 0' stroke='%23FFB020' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3Cline x1='16' y1='21' x2='22' y2='11' stroke='%23EDF2F7' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
/* ============================================================
   THE GLASS ENGINE
   night pit-lane telemetry meets a glass anatomy model
   ============================================================ */
:root {
  --bg: #171D26;
  --bg-deep: #10151C;
  --glass: rgba(255,255,255,0.05);
  --glass-2: rgba(255,255,255,0.085);
  --stroke: rgba(255,255,255,0.10);
  --amber: #FFB020;
  --amber-dim: rgba(255,176,32,0.16);
  --teal: #5BD1C6;
  --teal-dim: rgba(91,209,198,0.14);
  --alert: #FF5D45;
  --good: #6FDC8C;
  --ink: #EDF2F7;
  --dim: #8B97A8;
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --rad: 14px;
  --nav-h: 58px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
[hidden] { display: none !important; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  background:
    radial-gradient(1100px 500px at 85% -10%, rgba(91,209,198,0.06), transparent 60%),
    radial-gradient(900px 420px at -10% 0%, rgba(255,176,32,0.05), transparent 55%),
    var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.5;
  overflow-x: hidden;
  min-height: 100vh;
}
/* projector mode: scale everything up at lecture-hall widths */
@media (min-width: 900px)  { html { font-size: 19px; } :root { --nav-h: 0px; } }
@media (min-width: 1400px) { html { font-size: 22px; } }

.wrap { max-width: 60rem; margin: 0 auto; padding: 0 14px; }
:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; border-radius: 4px; }
button { font-family: inherit; color: inherit; }
.mono, .pct, .tok-id { font-family: var(--mono); font-variant-numeric: tabular-nums; }

/* ================= header ================= */
header { padding: 18px 0 10px; }
.hd-top h1 {
  font-size: 1.55rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1;
  cursor: pointer; user-select: none; -webkit-user-select: none;
}
.hd-top h1 .hl { color: var(--amber); }
.tag { color: var(--dim); font-size: 0.85rem; margin-top: 2px; }
.hd-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.hd-right { display: flex; align-items: center; gap: 8px; }

/* gauge cluster: the signature element */
.gauges { display: flex; gap: 6px; margin-top: 12px; }
.gauge { flex: 1; max-width: 78px; text-align: center; }
.gauge svg { width: 100%; height: auto; display: block; }
.gauge .g-lab { font-family: var(--mono); font-size: 0.56rem; color: var(--dim); letter-spacing: 0.08em; margin-top: 1px; }
.g-arc-bg { stroke: rgba(255,255,255,0.13); }
.g-ticks { stroke: rgba(255,255,255,0.28); }
.g-arc-fill {
  stroke: var(--amber);
  stroke-dasharray: 110;
  stroke-dashoffset: 110;
  transition: stroke-dashoffset 1.1s cubic-bezier(.3,.6,.3,1);
}
.g-needle-rot {
  transform: rotate(-120deg);
  transform-origin: 40px 40px;
  transform-box: view-box;
  transition: transform 1.15s cubic-bezier(.34,.9,.36,1.14);
}
.gauge.full .g-arc-fill { stroke-dashoffset: 0; }
.gauge.full .g-needle-rot { transform: rotate(120deg); }
.gauge.full svg { filter: drop-shadow(0 0 6px rgba(255,176,32,0.55)); }
.gauge.full .g-lab { color: var(--amber); }
/* engine idle flutter (stretch): tiny life in the needles */
@keyframes flutter { 0%,100% { transform: rotate(-120deg); } 38% { transform: rotate(-117.6deg); } 62% { transform: rotate(-119.4deg); } 80% { transform: rotate(-118.2deg); } }
.idle .gauge:not(.full) .g-needle-rot { animation: flutter 3.4s ease-in-out infinite; }
.idle .gauge:nth-child(2):not(.full) .g-needle-rot { animation-delay: 0.7s; }
.idle .gauge:nth-child(3):not(.full) .g-needle-rot { animation-delay: 1.3s; }
.idle .gauge:nth-child(4):not(.full) .g-needle-rot { animation-delay: 0.4s; }
.idle .gauge:nth-child(5):not(.full) .g-needle-rot { animation-delay: 1.9s; }
@keyframes rev { 0% { transform: rotate(-120deg); } 45% { transform: rotate(120deg); } 100% { transform: rotate(-120deg); } }
.gauge.rev .g-needle-rot { animation: rev 0.9s cubic-bezier(.4,0,.4,1) both; }

/* ================= tabs ================= */
.tabs {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  display: flex;
  background: rgba(16,21,28,0.92);
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  border-top: 1px solid var(--stroke);
  padding-bottom: env(safe-area-inset-bottom);
}
.tabs button {
  flex: 1; min-height: 52px; background: none; border: none; cursor: pointer;
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.09em;
  color: var(--dim); position: relative; padding-top: 6px;
}
.tabs button .t-dot {
  display: block; width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.18); margin: 0 auto 4px;
}
.tabs button.on { color: var(--amber); }
.tabs button.on .t-dot { background: var(--amber); box-shadow: 0 0 5px rgba(255,176,32,0.8); }
.tabs button.done .t-dot { background: var(--good); }
.tabs button.done.on .t-dot { background: var(--amber); }
@media (min-width: 900px) {
  .tabs {
    position: sticky; top: 0; bottom: auto;
    border-top: none; border-bottom: 1px solid var(--stroke);
    max-width: 60rem; margin: 0 auto; background: rgba(23,29,38,0.9);
  }
  .tabs button { font-size: 0.78rem; min-height: 54px; }
}

/* ================= layout ================= */
main { padding-bottom: calc(var(--nav-h) + 34px); }
.mod { display: none; padding-top: 16px; }
.mod.on { display: block; animation: modin 0.35s ease both; }
@keyframes modin { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.mod h2 { font-size: 1.28rem; font-weight: 800; letter-spacing: -0.015em; }
.mod h2 .h-num { font-family: var(--mono); font-size: 0.7rem; color: var(--teal); letter-spacing: 0.14em; display: block; margin-bottom: 2px; }
.cap { color: var(--dim); font-size: 0.9rem; margin: 6px 0 12px; max-width: 44rem; }
.cap strong { color: var(--ink); font-weight: 600; }
.foot {
  color: var(--dim); font-size: 0.78rem; margin: 14px 0 4px; padding: 10px 12px;
  border-left: 2px solid var(--teal); background: var(--teal-dim); border-radius: 0 8px 8px 0;
  max-width: 44rem;
}
.panel {
  background: var(--glass);
  border: 1px solid var(--stroke);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  border-radius: var(--rad);
  padding: 14px;
  margin: 10px 0;
}
.row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 2px; }

/* ================= controls ================= */
.btn {
  min-height: 44px; padding: 8px 16px; border-radius: 10px; cursor: pointer;
  background: var(--glass-2); border: 1px solid var(--stroke); color: var(--ink);
  font-size: 0.9rem; font-weight: 600;
  transition: transform 0.12s ease, background 0.2s ease;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--amber); border-color: var(--amber); color: #171D26; }
.btn:disabled { opacity: 0.4; cursor: default; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
.chip {
  min-height: 44px; padding: 8px 14px; border-radius: 999px; cursor: pointer;
  background: var(--glass-2); border: 1px solid var(--stroke); color: var(--ink); font-size: 0.85rem;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.chip.on { border-color: var(--amber); }
@media (hover: hover) { .chip:hover { border-color: var(--amber); } .bar:hover { border-color: var(--stroke); background: var(--glass); } .ck-opt:hover { border-color: var(--dim); } }
.chip.on { background: var(--amber-dim); color: var(--amber); }

/* ================= PREDICT ================= */
.gen-out {
  min-height: 64px; border-radius: 10px; background: var(--bg-deep);
  border: 1px solid var(--stroke); padding: 12px; font-size: 1.05rem; line-height: 1.65;
}
.gen-out .gw { display: inline-block; margin-right: 6px; }
.gen-out .gw.new { animation: wordin 0.3s ease both; }
@keyframes wordin { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.gen-out .hint { color: var(--dim); font-size: 0.88rem; }
.bars { margin: 12px 0 4px; display: flex; flex-direction: column; gap: 6px; }
.bar {
  display: grid; grid-template-columns: 6.2em 1fr 3.6em; align-items: center; gap: 8px;
  min-height: 44px; padding: 4px 10px; border-radius: 9px; cursor: pointer;
  background: none; border: 1px solid transparent; text-align: left;
}
.bar:focus-visible { border-color: var(--stroke); background: var(--glass); }
.bar .b-word { font-size: 0.92rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar .b-word.end { color: var(--dim); font-style: italic; }
.bar .b-track { height: 12px; border-radius: 6px; background: rgba(255,255,255,0.07); overflow: hidden; }
.bar .b-fill {
  display: block; height: 100%; border-radius: 6px; width: 0%;
  background: linear-gradient(90deg, var(--teal), #7FE3D9);
  transition: width 0.5s cubic-bezier(.3,.7,.3,1);
}
.bar:first-child .b-fill { background: linear-gradient(90deg, var(--amber), #FFC85C); }
.bar .pct { font-size: 0.78rem; color: var(--dim); text-align: right; }
.temp { margin-top: 14px; }
.temp-head { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.85rem; }
.temp-head .t-word { color: var(--amber); font-weight: 700; }
.temp-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
.temp-row .t-end { font-size: 0.72rem; color: var(--dim); font-family: var(--mono); letter-spacing: 0.05em; }
input[type="range"] { flex: 1; accent-color: var(--amber); min-height: 44px; }

/* ================= TOKENS ================= */
textarea {
  width: 100%; min-height: 84px; border-radius: 10px; resize: vertical;
  background: var(--bg-deep); border: 1px solid var(--stroke); color: var(--ink);
  font-size: 1rem; padding: 12px; font-family: inherit;
}
textarea:focus { outline: 2px solid var(--amber); outline-offset: 1px; }
.tokwrap { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; min-height: 54px; align-content: flex-start; }
.tok {
  display: inline-flex; flex-direction: column; align-items: center; max-width: 100%;
  padding: 5px 9px 3px; border-radius: 8px; border: 1px solid;
  animation: tokin 0.22s ease both;
}
@keyframes tokin { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: none; } }
.tok .tok-t { font-size: 0.95rem; font-weight: 600; white-space: pre-wrap; overflow-wrap: anywhere; }
.tok .tok-id { font-size: 0.6rem; opacity: 0.75; margin-top: 1px; }
.tok.c0 { background: rgba(255,176,32,0.13); border-color: rgba(255,176,32,0.5); }
.tok.c1 { background: rgba(91,209,198,0.13); border-color: rgba(91,209,198,0.5); }
.tok.c2 { background: rgba(157,140,255,0.14); border-color: rgba(157,140,255,0.55); }
.tok.c3 { background: rgba(111,220,140,0.12); border-color: rgba(111,220,140,0.5); }
.tok.c4 { background: rgba(255,143,178,0.12); border-color: rgba(255,143,178,0.5); }
.tok.hot { border-color: var(--amber); box-shadow: 0 0 8px rgba(255,176,32,0.4); }
.tok-count { color: var(--dim); font-size: 0.82rem; }
.ctx { margin-top: 12px; }
.ctx-track { height: 10px; border-radius: 5px; background: rgba(255,255,255,0.07); overflow: hidden; }
.ctx-fill { height: 100%; min-width: 2px; width: 0%; background: var(--teal); border-radius: 5px; transition: width 0.3s ease; }
.ctx-lab { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--dim); margin-top: 4px; }

/* ================= MEANING ================= */
.mapwrap {
  border-radius: 10px; background: var(--bg-deep); border: 1px solid var(--stroke);
  overflow: hidden; touch-action: none; cursor: grab; position: relative; height: 340px;
  -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
}
@media (min-width: 900px) { .mapwrap { height: 460px; } }
.mapwrap svg { display: block; width: 100%; height: 100%; }
.map-hint {
  position: absolute; top: 8px; right: 10px; font-family: var(--mono); font-size: 0.62rem;
  color: var(--dim); letter-spacing: 0.08em; pointer-events: none;
}
.node text { fill: var(--ink); font-size: 4.2px; font-family: var(--mono); pointer-events: none;
  paint-order: stroke; stroke: rgba(16,21,28,0.92); stroke-width: 1px; }
.node text.toff { display: none; }
.node.sel text, .node.pulse text, .node text.toff.show { display: block; }
.node.sel text { fill: var(--amber); font-weight: 700; font-size: 4.8px; }
.node.sel circle.dot { fill: var(--amber); }
.node.nb text { fill: #A9E9E2; }
.nline { stroke: var(--teal); stroke-opacity: 0.55; stroke-width: 0.35; }
.anim .nline { stroke-dasharray: 60; stroke-dashoffset: 60; animation: draw 0.6s ease forwards; }
@keyframes draw { to { stroke-dashoffset: 0; } }
.ghost { fill: var(--amber); filter: drop-shadow(0 0 2px rgba(255,176,32,0.9)); }
@keyframes npulse { 0%,100% { transform: scale(1);} 40% { transform: scale(1.7);} }
.node.pulse circle.dot { animation: npulse 0.9s ease 2; transform-box: fill-box; transform-origin: center; }
.node.pulse text { fill: var(--amber); font-weight: 700; }
.wm-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
.wm-row .op { color: var(--amber); font-size: 1.1rem; width: 0.8em; text-align: center; }
select, .txt {
  min-height: 44px; border-radius: 9px; background: var(--bg-deep); color: var(--ink);
  border: 1px solid var(--stroke); font-size: 1rem; padding: 6px 8px; font-family: var(--mono);
  flex: 1; min-width: 88px;
}
.txt { font-family: inherit; }
.wm-out { min-height: 1.4em; font-size: 0.92rem; margin-top: 10px; }
.wm-out .ans { color: var(--amber); font-weight: 800; font-family: var(--mono); }

/* ================= ATTENTION ================= */
.att-stage { position: relative; padding: 14px 4px 8px; }
.att-stage.armed { padding-top: 88px; }
.att-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
.att-svg path { fill: none; stroke: var(--teal); transition: stroke-width 0.55s ease, stroke-opacity 0.55s ease, stroke 0.4s ease; }
.att-svg path.top { stroke: var(--amber); }
.att-svg.grow path { stroke-dasharray: 400; stroke-dashoffset: 400; animation: draw2 0.8s ease forwards; }
@keyframes draw2 { to { stroke-dashoffset: 0; } }
.att-words { display: flex; flex-wrap: wrap; gap: 6px; position: relative; }
.aw {
  min-height: 44px; padding: 8px 11px; border-radius: 9px; font-size: 0.95rem; cursor: pointer;
  background: var(--glass-2); border: 1px solid var(--stroke); color: var(--ink);
  transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
}
.aw.it { border-color: var(--teal); color: var(--teal); font-weight: 700; }
.aw.pick { border-color: var(--ink); background: rgba(255,255,255,0.14); }
.aw.ans { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); font-weight: 700; box-shadow: 0 0 10px rgba(255,176,32,0.35); }
.aw.right { border-color: var(--good); background: rgba(111,220,140,0.15); color: var(--good); }
.aw.endw { border-style: dashed; }
.aw:disabled { cursor: default; }
.att-verdict { min-height: 1.5em; font-size: 0.92rem; margin-top: 10px; }
.att-verdict .yes { color: var(--good); font-weight: 700; }
.att-grid { margin-top: 12px; overflow-x: auto; }
.att-grid table { border-collapse: collapse; font-family: var(--mono); font-size: 0.58rem; }
.att-grid th { color: var(--dim); font-weight: 400; padding: 2px 3px; text-align: right; max-width: 5.5em; overflow: hidden; text-overflow: ellipsis; }
.att-grid thead th { writing-mode: vertical-rl; transform: rotate(180deg); text-align: left; max-height: 5.5em; }
.att-grid td { width: 20px; height: 20px; border: 1px solid rgba(255,255,255,0.04); }
@media (min-width: 900px) {
  .att-grid td { width: 30px; height: 30px; }
  .att-grid table { font-size: 0.74rem; }
  .att-grid th { max-width: 8em; }
}

/* ================= LOOP ================= */
.loop-q { font-size: 1rem; font-weight: 600; padding: 12px; border-radius: 10px; background: var(--bg-deep); border: 1px solid var(--stroke); }
.loop-q .mono { color: var(--teal); }
.steps { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.step {
  border-radius: 10px; border: 1px solid var(--stroke); background: var(--glass);
  padding: 10px 12px; animation: stepin 0.4s ease both;
}
@keyframes stepin { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.badge {
  display: inline-block; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.12em;
  padding: 3px 8px; border-radius: 5px; margin-bottom: 6px; font-weight: 700;
}
.badge.plan { background: var(--amber-dim); color: var(--amber); }
.badge.act { background: var(--teal-dim); color: var(--teal); }
.badge.observe { background: rgba(139,151,168,0.16); color: #AAB6C6; }
.badge.answer { background: rgba(111,220,140,0.16); color: var(--good); }
.step p { font-size: 0.92rem; }
.toolchip {
  display: inline-block; font-family: var(--mono); font-size: 0.8rem; color: var(--teal);
  background: var(--bg-deep); border: 1px solid rgba(91,209,198,0.4); border-radius: 7px;
  padding: 5px 9px; margin: 5px 0;
}
.toolret { font-family: var(--mono); font-size: 0.8rem; color: var(--dim); padding: 4px 0 0 8px; border-left: 2px solid var(--stroke); margin-left: 4px; }
.toolret .rv { color: var(--ink); }
.loop-close { font-weight: 700; color: var(--amber); font-size: 1rem; margin-top: 12px; }

/* ================= checkpoint ================= */
.checkpoint {
  margin-top: 20px; border-radius: var(--rad); padding: 14px;
  border: 1px solid rgba(255,176,32,0.35);
  background: linear-gradient(180deg, rgba(255,176,32,0.06), rgba(255,255,255,0.03));
}
.checkpoint .ck-tag { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.16em; color: var(--amber); }
.checkpoint .ck-q { font-size: 1rem; font-weight: 700; margin: 6px 0 10px; }
.ck-opts { display: flex; flex-direction: column; gap: 8px; }
.ck-opt {
  min-height: 44px; text-align: left; padding: 10px 12px; border-radius: 10px; cursor: pointer;
  background: var(--glass-2); border: 1px solid var(--stroke); color: var(--ink); font-size: 0.9rem;
  transition: border-color 0.2s ease;
}
.ck-opt.good { border-color: var(--good); background: rgba(111,220,140,0.14); color: var(--good); font-weight: 700; }
.ck-opt.bad { border-color: var(--alert); background: rgba(255,93,69,0.1); animation: shake 0.3s ease; }
@keyframes shake { 25% { transform: translateX(-4px);} 75% { transform: translateX(4px);} }
.ck-fb { min-height: 1.4em; font-size: 0.88rem; margin-top: 10px; }
.ck-fb.ok { color: var(--good); }
.ck-fb.no { color: var(--alert); }
.ck-done { color: var(--amber); font-family: var(--mono); font-size: 0.78rem; margin-top: 8px; }

/* ================= license ================= */
.lic-banner {
  position: fixed; left: 12px; right: 12px; bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 10px);
  z-index: 30; display: flex; justify-content: center;
  animation: bannerin 0.6s cubic-bezier(.3,.8,.3,1.1) both;
}
@media (min-width: 900px) { .lic-banner { bottom: 24px; } }
@keyframes bannerin { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: none; } }
.lic-banner button {
  box-shadow: 0 6px 24px rgba(255,176,32,0.4); font-size: 0.95rem;
}
.modal {
  position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
  background: rgba(10,13,18,0.8); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  padding: 16px; overflow-y: auto;
}
.modal-inner { width: 100%; max-width: 26rem; animation: modin 0.3s ease both; }
.modal-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: var(--dim); font-size: 1.6rem; cursor: pointer; min-width: 44px; min-height: 44px; }
.lic-form { position: relative; background: var(--bg); border: 1px solid var(--stroke); border-radius: var(--rad); padding: 16px; }
.lic-form h3 { font-size: 1.1rem; letter-spacing: -0.01em; padding-right: 36px; }
.lic-form input {
  width: 100%; min-height: 44px; margin: 10px 0; border-radius: 9px; padding: 8px 12px;
  background: var(--bg-deep); border: 1px solid var(--stroke); color: var(--ink); font-size: 1rem;
